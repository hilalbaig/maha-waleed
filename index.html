<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Subscription Expired | Access Suspended</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Force full coverage and fix any rendering issues */
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #f1f5f9;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #eef2f3 0%, #d9e2e8 100%);
        }

        /* Main card - robust and visible */
        .expired-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem 2.8rem;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(203, 213, 225, 0.5);
        }

        /* Big alert icon */
        .icon-area {
            margin-bottom: 1.6rem;
        }
        .circle-badge {
            background: #fee2e2;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(185, 28, 28, 0.12);
        }
        .expired-icon {
            width: 48px;
            height: 48px;
            display: block;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .status-badge {
            background: #f1f5f9;
            display: inline-block;
            padding: 0.3rem 1.1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b91c1c;
            margin-bottom: 1.2rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            border: 1px solid #e2e8f0;
        }

        .message-text {
            color: #334155;
            font-size: 1rem;
            line-height: 1.5;
            margin: 0.5rem 0 0.8rem 0;
            font-weight: 450;
        }

        .date-block {
            background: #f8fafc;
            border-radius: 60px;
            padding: 0.6rem 1rem;
            margin: 1.2rem 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            border: 1px solid #e2edf2;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .date-block span:first-child {
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4338ca;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.8rem;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2);
        }
        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn-secondary {
            background: white;
            color: #1e293b;
            border: 1px solid #cbd5e1;
        }
        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #94a3b8;
            transform: translateY(-2px);
        }

        .footnote {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5b6e8c;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
            display: inline-block;
            width: 100%;
        }

        /* fix for very small screens */
        @media (max-width: 500px) {
            .expired-card {
                padding: 1.8rem 1.2rem 2rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn {
                padding: 0.65rem 1.4rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="expired-card">
        <div class="icon-area">
            <div class="circle-badge">
                <svg class="expired-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="#b91c1c" stroke-width="1.8"/>
                    <path d="M12 8V12L15 15" stroke="#b91c1c" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="12" cy="16" r="1" fill="#b91c1c" stroke="none"/>
                </svg>
            </div>
        </div>
        <h1>Subscription expired</h1>
        <div class="status-badge">⚠️ ACCESS INACTIVE</div>
        <div class="message-text">
            Your premium plan is no longer active.<br> Renew your subscription to restore full access.
        </div>
        
        <div class="date-block">
            <span>Expired on</span>
            <strong>April 13, 2026</strong>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="renewButton">⟳ Renew subscription</button>
            <button class="btn btn-secondary" id="detailsButton">📋 View plans</button>
        </div>
        <div class="footnote">
            • No hidden fees • Cancel anytime • reactivate in seconds
        </div>
    </div>

    <script>
        // Ensure all interactions are clear and functional (very short)
        const renewBtn = document.getElementById('renewButton');
        const detailsBtn = document.getElementById('detailsButton');

        if (renewBtn) {
            renewBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // Clear feedback that demonstrates renewal flow
                alert("✅ Redirecting to secure renewal portal.\n\n( Demo: Your subscription would be instantly renewed )");
                // In real scenario: window.location.href = "/billing/upgrade";
            });
        }

        if (detailsBtn) {
            detailsBtn.addEventListener('click', function(e) {
                e.preventDefault();
                alert("📦 Plan options: Monthly ($9.99) | Yearly ($89) | Pro Team\nAll plans include premium support + advanced analytics.");
            });
        }
    </script>
</body>
</html>
