<body class="bg-paper text-forest antialiased min-h-screen">
    <div id="root">

    <script type="text/babel">
        // Error handling for the script
        window.onerror = function(message, source, lineno, colno, error) {
            const display = document.getElementById('error-display');
            if (display) display.innerHTML = `Error: ${message}<br/>at ${source}:${lineno}`;
            return false;
        };

        const { useState, useEffect, useRef, useMemo } = React;
        
        // Framer Motion UMD access
        const motion = window.Motion.motion;
        const AnimatePresence = window.Motion.AnimatePresence;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyATx7BPZ6xWv6eawg3oP_9BEKDkIZ8PNPY",
            authDomain: "maha-waleed.firebaseapp.com",
            databaseURL: "https://maha-waleed-default-rtdb.firebaseio.com",
            projectId: "maha-waleed",
            storageBucket: "maha-waleed.firebasestorage.app",
            messagingSenderId: "672540737351",
            appId: "1:672540737351:web:0b7aacbd799aba27d45662",
            measurementId: "G-LQ6R7EMMM5"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- UTILS ---
        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // --- LUCIDE ICON WRAPPER ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        // Clear existing content
                        iconRef.current.innerHTML = '';
                        
                        // Create SVG manually to be safe
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size);
                        svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24");
                        svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor");
                        svg.setAttribute("stroke-width", "2");
                        svg.setAttribute("stroke-linecap", "round");
                        svg.setAttribute("stroke-linejoin", "round");
                        svg.setAttribute("class", `lucide lucide-${name} ${className}`);
                        
                        // Add paths from lucide data
                        iconData[2].forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([key, value]) => {
                                element.setAttribute(key, value);
                            });
                            svg.appendChild(element);
                        });
                        
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={cn("inline-block", className)} style={{ width: size, height: size, lineHeight: 0 }}></span>;
        };

        // --- CONSTANTS ---
        const WEDDING_DETAILS = {
            event: "Walima Ceremony",
            groom: { 
                name: "Muhammad Waleed Khan",
                father: "Haji Riaz Khan",
                grandfather: "HAJI MURAD KHAN (LATE)"
            },
            bride: { 
                name: "Maha",
                father: "SADEEQ KHAN"
            },
            date: "2026-04-19",
            time: "7:00 PM",
            venue: {
                name: "Marbella Wedding Hall",
                address: "Canal Road, Sher Ali Town, Warsak Road, Peshawar",
                mapLink: "https://maps.app.goo.gl/BtUoFAXXECTZLuz59"
            },
            hosts: [
                { name: "Sheraz Khan", phone: "923159596978" },
                { name: "Fayaz Khan", phone: "923119922622" },
                { name: "Yousaf Khan", phone: "923005951547" },
                { name: "Nouman Khan", phone: "923148009570" }
            ],
            rsvp: "All Friends",
            lookingForward: "All Family Members"
        };

        const FALLBACK_RESPONSES = {
            wishes: [
                "May Allah bless Waleed & Maha's union with eternal love and barakah on this beautiful Walima day.",
                "Wishing you a lifetime of happiness as you celebrate your Walima. May your home be a sanctuary of peace.",
                "Heartiest congratulations to the beautiful couple! May this Walima be the start of a journey filled with grace."
            ],
            outfits: [
                { title: "Pastel Silk Suit", description: "A light mint or peach silk suit is perfect for a spring Walima in Peshawar." },
                { title: "Embroidered Waistcoat", description: "A cream or beige waistcoat over a white shalwar kameez offers a clean, festive look." },
                { title: "Chiffon Dupatta with Zari", description: "A lightweight chiffon dupatta with delicate zari work adds elegance without the weight." }
            ],
            gifts: [
                { title: "Home Appliance", description: "A quality air fryer or coffee machine is practical for a new home." },
                { title: "Personalized Prayer Mats", description: "A beautiful set of matching prayer rugs is a blessed gift." },
                { title: "Dinner Set", description: "A classic bone china dinner set for their future hosting." }
            ]
        };

        // --- COMPONENTS ---

        const PetalBackground = () => {
            const [petals, setPetals] = useState([]);
            useEffect(() => {
                const createPetal = () => ({
                    id: Math.random(),
                    left: Math.random() * 100,
                    animationDuration: 8 + Math.random() * 10,
                    delay: Math.random() * 5,
                    size: 15 + Math.random() * 20,
                    type: Math.random() > 0.7 ? '🌿' : Math.random() > 0.4 ? '🍃' : '✨' 
                });
                setPetals(Array.from({ length: 20 }, createPetal));
                const i = setInterval(() => setPetals(p => [...p.slice(-30), createPetal()]), 3000);
                return () => clearInterval(i);
            }, []);
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    {petals.map(p => (
                        <div key={p.id} className="absolute animate-fall opacity-30" style={{
                            left: `${p.left}%`, animationDuration: `${p.animationDuration}s`, animationDelay: `${p.delay}s`,
                            fontSize: `${p.size}px`, top: '-30px'
                        }}>{p.type}</div>
                    ))}
                </div>
            );
        };

        const SectionTitle = ({ children, subtitle }) => (
            <div className="text-center mb-12">
                {subtitle && <p className="font-serif text-gold uppercase tracking-[0.3em] text-xs mb-2">{subtitle}</p>}
                <h2 className="font-serif text-4xl md:text-5xl font-light text-forest tracking-tight">{children}</h2>
                <div className="h-px w-24 bg-gold/30 mx-auto mt-6" />
            </div>
        );

        const WeddingConcierge = () => {
            const [activeTab, setActiveTab] = useState('wishes');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleGenerate = () => {
                setLoading(true);
                setTimeout(() => {
                    setResult(FALLBACK_RESPONSES[activeTab]);
                    setLoading(false);
                }, 800);
            };

            const tabs = [
                { id: 'wishes', label: 'Wishes', icon: 'Heart' },
                { id: 'outfits', label: 'Attire', icon: 'Shirt' },
                { id: 'gifts', label: 'Gifts', icon: 'Gift' },
            ];

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    className="max-w-5xl mx-auto px-6 py-12"
                >
                    <div className="bg-white shadow-xl rounded-none border border-gold/20 p-8 md:p-16 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-5">
                            <Icon name="Sparkles" size={120} className="text-gold" />
                        </div>
                        
                        <SectionTitle subtitle="AI Assistant">Wedding Concierge</SectionTitle>
                        
                        <div className="flex flex-wrap justify-center gap-4 mb-12">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id} 
                                    onClick={() => { setActiveTab(tab.id); setResult(null); }}
                                    className={cn(
                                        "flex items-center gap-3 px-8 py-3 rounded-none text-xs font-bold tracking-[0.2em] uppercase transition-all duration-300 border",
                                        activeTab === tab.id 
                                            ? "bg-forest text-white border-forest shadow-lg" 
                                            : "bg-transparent text-forest border-gold/20 hover:border-gold"
                                    )}
                                >
                                    <Icon name={tab.icon} size={14} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        <div className="flex justify-center mb-12">
                            <button 
                                onClick={handleGenerate}
                                disabled={loading}
                                className="group relative flex items-center gap-3 bg-gold text-white px-12 py-4 rounded-none font-bold tracking-[0.3em] uppercase text-[10px] shadow-lg hover:bg-gold/90 transition-all disabled:opacity-50"
                            >
                                {loading ? <Icon name="Loader2" className="animate-spin" size={16} /> : <Icon name="Sparkles" size={16} />}
                                Generate {activeTab}
                            </button>
                        </div>

                        <AnimatePresence mode="wait">
                            {result && (
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    className="grid md:grid-cols-3 gap-8"
                                >
                                    {result.map((item, i) => (
                                        <motion.div 
                                            key={i}
                                            initial={{ opacity: 0, y: 10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: i * 0.1 }}
                                            className="bg-paper/50 p-8 border border-gold/10 hover:border-gold/30 transition-all"
                                        >
                                            {activeTab === 'wishes' ? (
                                                <p className="italic text-forest/80 font-serif text-xl leading-relaxed">"{item}"</p>
                                            ) : (
                                                <div>
                                                    <h4 className="font-serif text-2xl text-forest mb-3 font-medium">{item.title}</h4>
                                                    <p className="text-forest/60 text-sm leading-relaxed font-sans">{item.description}</p>
                                                </div>
                                            )}
                                        </motion.div>
                                    ))}
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </motion.div>
            );
        };

        const Guestbook = () => {
            const [messages, setMessages] = useState([]);
            const [name, setName] = useState('');
            const [msg, setMsg] = useState('');
            const [loading, setLoading] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                const unsubscribe = db.collection('guestbook')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .onSnapshot((snapshot) => {
                        setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                return () => unsubscribe();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!name.trim() || !msg.trim()) return;
                setLoading(true);
                try {
                    await db.collection('guestbook').add({
                        name: name.trim(),
                        message: msg.trim(),
                        createdAt: new Date().toISOString()
                    });
                    setMsg('');
                } catch (error) {
                    console.error("Guestbook error:", error);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirm("Delete this message?")) {
                    await db.collection('guestbook').doc(id).delete();
                }
            };

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    className="max-w-5xl mx-auto px-6 py-12"
                >
                    <div className="bg-white shadow-xl rounded-none border border-gold/20 p-8 md:p-16">
                        <div className="flex items-center justify-between mb-12">
                            <SectionTitle subtitle="Blessings">Guestbook</SectionTitle>
                            <button 
                                onClick={() => { if(isAdmin) setIsAdmin(false); else if(prompt("Admin Password")==="admin123") setIsAdmin(true); }}
                                className="text-gold/20 hover:text-gold transition-colors"
                            >
                                <Icon name="Lock" size={14} />
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="grid md:grid-cols-12 gap-6 mb-16">
                            <div className="md:col-span-4">
                                <input 
                                    type="text" 
                                    placeholder="Your Name" 
                                    value={name} 
                                    onChange={e=>setName(e.target.value)} 
                                    className="w-full bg-paper/30 border border-gold/20 rounded-none px-6 py-4 focus:outline-none focus:border-gold font-serif text-lg"
                                    required 
                                />
                            </div>
                            <div className="md:col-span-6">
                                <input 
                                    placeholder="Write a blessing..." 
                                    value={msg} 
                                    onChange={e=>setMsg(e.target.value)} 
                                    className="w-full bg-paper/30 border border-gold/20 rounded-none px-6 py-4 focus:outline-none focus:border-gold font-serif text-lg"
                                    required 
                                />
                            </div>
                            <div className="md:col-span-2">
                                <button 
                                    disabled={loading} 
                                    type="submit" 
                                    className="w-full h-full bg-forest text-white py-4 rounded-none font-bold tracking-[0.3em] uppercase text-[10px] shadow-lg hover:bg-forest/90 transition-all disabled:opacity-50"
                                >
                                    {loading ? <Icon name="Loader2" className="animate-spin mx-auto" size={16} /> : "Post"}
                                </button>
                            </div>
                        </form>

                        <div className="grid md:grid-cols-2 gap-8 max-h-[600px] overflow-y-auto custom-scrollbar pr-4">
                            <AnimatePresence initial={false}>
                                {messages.map((m) => (
                                    <motion.div 
                                        key={m.id} 
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        exit={{ opacity: 0 }}
                                        className="bg-paper/20 p-8 border border-gold/5 hover:border-gold/20 transition-all relative group"
                                    >
                                        <div className="flex justify-between items-start mb-6">
                                            <h4 className="font-serif text-2xl text-forest font-medium">{m.name}</h4>
                                            <div className="flex items-center gap-3">
                                                <span className="text-[9px] text-gold font-bold uppercase tracking-[0.2em]">
                                                    {new Date(m.createdAt).toLocaleDateString()}
                                                </span>
                                                {isAdmin && (
                                                    <button onClick={()=>handleDelete(m.id)} className="text-red-400 hover:text-red-600 transition-colors">
                                                        <Icon name="Trash2" size={12} />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <p className="text-forest/70 font-serif italic text-lg leading-relaxed">"{m.message}"</p>
                                    </motion.div>
                                ))}
                            </AnimatePresence>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const InvitationCard = () => {
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [loveCount, setLoveCount] = useState(0);

            useEffect(() => {
                const unsubscribe = db.collection('stats').doc('engagement').onSnapshot((doc) => {
                    if (doc.exists) {
                        setLoveCount(doc.data().loves || 0);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const t = setInterval(() => {
                    const diff = new Date('2026-04-19T19:00:00').getTime() - new Date().getTime();
                    if (diff > 0) {
                        setTimeLeft({ 
                            d: Math.floor(diff/(1000*60*60*24)), 
                            h: Math.floor((diff/(1000*60*60))%24), 
                            m: Math.floor((diff/1000/60)%60), 
                            s: Math.floor((diff/1000)%60) 
                        });
                    }
                }, 1000);
                return () => clearInterval(t);
            }, []);

            const handleLove = () => {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#064e3b', '#D4AF37', '#ffffff']
                });
                db.collection('stats').doc('engagement').set({ loves: firebase.firestore.FieldValue.increment(1) }, { merge: true });
            };

            return (
                <div className="relative w-full max-w-5xl mx-auto px-6 z-10">
                    <motion.div 
                        initial={{ opacity: 0, y: 50 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 1.2, ease: [0.22, 1, 0.36, 1] }}
                        className="bg-white shadow-[0_80px_120px_-20px_rgba(0,0,0,0.12)] rounded-none border border-gold/20 overflow-hidden relative"
                    >
                        <div className="absolute inset-0 opacity-[0.02] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/paper.png')]" />
                        
                        <div className="grid lg:grid-cols-12 min-h-[850px]">
                            <div className="lg:col-span-5 bg-forest relative overflow-hidden flex flex-col justify-between p-6 md:p-16 text-white border-b lg:border-b-0 lg:border-r border-gold/10 items-center lg:items-stretch">
                                <div className="absolute inset-0 opacity-30 mix-blend-overlay">
                                    <img src="https://picsum.photos/seed/wedding-luxury/1000/1500" alt="Atmosphere" className="w-full h-full object-cover grayscale" referrerPolicy="no-referrer" />
                                </div>
                                
                                <div className="absolute top-0 left-0 p-8 opacity-20 hidden lg:block">
                                    <div className="w-16 h-16 border-t border-l border-gold" />
                                </div>

                                <div className="relative z-10 w-full flex flex-col items-center lg:items-start">
                                    <motion.div 
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.6 }}
                                        className="flex items-center justify-center lg:justify-start gap-4 mb-10 lg:mb-16 w-full"
                                    >
                                        <div className="h-px w-12 bg-gold hidden lg:block" />
                                        <div className="h-px flex-1 bg-gold lg:hidden" />
                                        <span className="font-sans text-gold uppercase tracking-[0.4em] text-[9px] font-bold whitespace-nowrap px-2">The Walima of</span>
                                        <div className="h-px flex-1 bg-gold lg:hidden" />
                                    </motion.div>
                                    
                                    <div className="space-y-4 lg:space-y-4 w-full flex flex-col items-center lg:items-stretch">
                                        <h1 className="font-serif text-6xl sm:text-8xl md:text-9xl font-extralight leading-[0.85] tracking-tighter text-center lg:text-left w-full">
                                            Waleed
                                        </h1>
                                        <div className="flex items-center justify-center gap-4 w-full">
                                            <div className="h-px flex-1 bg-gold/20" />
                                            <span className="font-script text-gold text-5xl sm:text-6xl md:text-7xl">&</span>
                                            <div className="h-px flex-1 bg-gold/20" />
                                        </div>
                                        <h1 className="font-serif text-6xl sm:text-8xl md:text-9xl font-extralight leading-[0.85] tracking-tighter text-center lg:text-right w-full">
                                            Maha
                                        </h1>
                                    </div>
                                </div>

                                <div className="relative z-10 w-full mt-12 lg:mt-0 flex flex-col items-center">
                                    <div className="grid grid-cols-4 gap-4 sm:gap-8 mb-10 w-full max-w-xs sm:max-w-none">
                                        {Object.entries(timeLeft).map(([k, v]) => (
                                            <div key={k} className="flex flex-col items-center">
                                                <span className="text-2xl sm:text-4xl font-serif font-light tracking-tighter">{v}</span>
                                                <span className="text-[8px] uppercase tracking-[0.2em] text-gold/60 font-bold mt-1">{k==='d'?'Days':k==='h'?'Hrs':k==='m'?'Min':'Sec'}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="h-px w-full bg-gold/10 mb-6" />
                                    <p className="font-sans text-[9px] uppercase tracking-[0.4em] text-white/30 text-center font-bold">Counting down to the celebration</p>
                                </div>
                            </div>

                            <div className="lg:col-span-7 bg-white p-12 md:p-24 flex flex-col justify-center relative">
                                <div className="absolute bottom-0 right-0 p-8 opacity-10">
                                    <div className="w-16 h-16 border-b border-r border-gold" />
                                </div>
